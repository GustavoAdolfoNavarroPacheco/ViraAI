version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vira_db
    environment:
      POSTGRES_USER: vira_user
      POSTGRES_PASSWORD: vira_password123
      POSTGRES_DB: vira_db
    ports:
      - "5432:5432"
    volumes:
      - vira_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vira_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vira_api
    command: sh -c "python app/db_init.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vira_celery_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  vira_pgdata:
