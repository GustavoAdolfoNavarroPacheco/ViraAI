version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vira_db
    environment:
      POSTGRES_USER: vira_user
      POSTGRES_PASSWORD: vira_password123
      POSTGRES_DB: vira_db
    ports:
      - "5432:5432"
    volumes:
      - vira_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vira_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  vira_pgdata:
